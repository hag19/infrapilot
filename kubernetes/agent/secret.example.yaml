# NOT applied by GitOps (deliberately excluded from kustomization.yaml so ArgoCD
# never overwrites your real key). Create the Secret out-of-band:
#
#   kubectl -n ai create secret generic infrapilot-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#
# In a real setup, manage this with sealed-secrets / SOPS / External Secrets
# instead of a raw Secret.
apiVersion: v1
kind: Secret
metadata:
  name: infrapilot-secrets
  namespace: ai
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
