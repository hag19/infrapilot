apiVersion: v1
kind: ConfigMap
metadata:
  name: infrapilot-config
  namespace: ai
data:
  INFRAPILOT_MODEL: "claude-opus-4-8"
  INFRAPILOT_EFFORT: "high"
  PROMETHEUS_URL: "http://monitoring-prometheus.monitoring:9090"
  # Diagnose-and-propose only by default. Flip to "true" (and the RBAC in
  # rbac.yaml allows it) to let the agent roll-restart Deployments in `ai`.
  INFRAPILOT_ALLOW_REMEDIATION: "false"
