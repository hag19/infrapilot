# Tells the Prometheus operator to scrape the NVIDIA DCGM exporter that the GPU
# Operator runs in the gpu-operator namespace. This is what gets GPU utilization,
# VRAM, temperature, power, and clocks into Prometheus.
#
# Verify the target service name/port on your cluster:
#   kubectl -n gpu-operator get svc -l app=nvidia-dcgm-exporter
#   kubectl -n gpu-operator get svc nvidia-dcgm-exporter -o jsonpath='{.spec.ports[*].name}'
# Adjust the matchLabels / port below if they differ.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nvidia-dcgm-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: ai-platform
    # The kube-prometheus-stack on this cluster only adopts ServiceMonitors
    # carrying its release label (serviceMonitorSelector: release=monitoring).
    # This was previously set imperatively (kubectl label ... release=monitoring),
    # so the object drifted from git and the observability-extras app had to stay
    # out of ArgoCD (selfHeal would strip the label). Declaring it here makes the
    # app safe to bring under ArgoCD.
    release: monitoring
spec:
  namespaceSelector:
    matchNames: [gpu-operator]
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  endpoints:
    - port: gpu-metrics # DCGM exporter metrics port (9400)
      interval: 15s
      path: /metrics
