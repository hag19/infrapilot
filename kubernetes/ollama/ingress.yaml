# Exposes Open WebUI at chat.hag19.howes via the cluster's ingress-nginx
# (a DaemonSet with hostPort 80/443 on every worker). DNS: add an A record
# chat.hag19.howes -> a worker IP (192.168.1.121), same pattern as rancher/grafana.
#
# Served over plain HTTP: this cluster has no ACME/letsencrypt ClusterIssuer, so
# TLS is intentionally off (ssl-redirect disabled) to avoid a fake-cert warning.
# To add TLS later, set a real cluster-issuer + a tls: block and flip ssl-redirect.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: ai
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: chat.hag19.howes
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 80
