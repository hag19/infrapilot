# kube-prometheus-stack (Helm). The monitoring stack is SHARED cluster infra
# owned by the base homelab repo (proxmox-k8s-ha), so its values live there and
# this app references them as $values — this repo does not duplicate them.
#
# Adopting the existing live release into ArgoCD: see docs/04-gitops.md
# ("Adopting hand-installed releases"). Key facts pinned to match what's live
# (helm -n monitoring list):
#   - chart kube-prometheus-stack-86.2.0
#   - release name "monitoring" (helm.releaseName below — must equal the live
#     release so the render matches and adoption is a no-op)
#
# PREREQ: the base repo gitignores k8s/, so values-monitoring.yaml must be
# un-ignored, committed and pushed there before ArgoCD can read it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.2.0 # pinned to the live release (app v0.91.0)
      helm:
        releaseName: monitoring # must match the live Helm release name
        valueFiles:
          - $values/k8s/monitoring/values-monitoring.yaml
    - repoURL: https://github.com/hag19/proxmox-k8s-ha.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # The Grafana admin password is NOT in git (the base-repo values don't set it),
  # so the chart would render the default and a sync would reset the live
  # password. Leave that secret field (and the Deployment checksum it drives)
  # to the cluster; RespectIgnoreDifferences makes sync honor these, not just diff.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: monitoring-grafana
      namespace: monitoring
      jsonPointers:
        - /data/admin-password
        - /data/admin-user
    - group: apps
      kind: Deployment
      name: monitoring-grafana
      namespace: monitoring
      jqPathExpressions:
        - '.spec.template.metadata.annotations."checksum/secret"'
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # kube-prometheus-stack CRDs are large
      - RespectIgnoreDifferences=true
