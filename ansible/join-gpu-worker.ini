# Extra inventory fragment: adds gpu-worker-1 to the proxmox repo's
# `new_workers` group so its join-workers.yml can join the GPU node WITHOUT
# editing the base homelab inventory. Use both inventories together:
#
#   cd ~/proxmox/ansible
#   ansible-playbook -i inventory.ini -i ~/ai-platform/ansible/join-gpu-worker.ini \
#     join-workers.yml --limit 'master:gpu-worker-1'
[new_workers]
gpu-worker-1 ansible_host=192.168.1.127 ansible_user=debian node_fqdn=gpu-worker-1.first-cluster.hag19.howes node_ip=192.168.1.127
