# ai-platform inventory.
#   proxmox     = PVE host that owns the RTX 3070 (vfio host prep).
#   gpu_workers = the GPU passthrough VM (created by ../terraform), joins the
#                 existing cluster. SSH as cloud-init 'debian' user, sudo NOPASSWD.

[proxmox]
proxmox-node1 ansible_host=192.168.1.103 ansible_user=hag

[gpu_workers]
gpu-worker-1 ansible_host=192.168.1.127 node_fqdn=gpu-worker-1.first-cluster.hag19.howes node_ip=192.168.1.127

[gpu_workers:vars]
ansible_user=debian

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_become=true
ansible_become_method=sudo
